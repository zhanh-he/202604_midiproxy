# @package _global_

defaults:
  - _self_

# Self-contained train config.
sampler_preset: mixed_v2
segment_seconds: 2.0
boundary_mode: default
task_name: ${dataset.train.instrument_name}_${sampler_preset}_${seg_tag:${segment_seconds}}_${boundary_mode}
reset_output_dir: false

tags:
  - ${task_name}
  - ${dataset.name}
  - ${model.name}

seed: 86

ckpt_path: null
run_id: null

paths:
  # Default to the launch directory so notebooks/scripts run cleanly from repo root
  # without requiring PROJECT_ROOT to be exported.
  repo_root: ${oc.env:PROJECT_ROOT,.}

  # Per-machine data workspace. Override from CLI if needed:
  # paths.workspace_dir=/some/other/root
  workspace_dir: /media/mengh/SharedData/zhanh/202601_midisemi_data
  project_name: synth-proxy_v1

  project_dir: ${paths.workspace_dir}/${paths.project_name}
  data_dir: ${paths.project_dir}/data
  proxy_dir: ${paths.project_dir}/proxy

  ckpt_dir: ${paths.proxy_dir}/checkpoints

  output_dir: ${hydra:runtime.output_dir}
  work_dir: ${hydra:runtime.cwd}

dataset:
  name: piano

  train:
    path: null
    instrument_name: salamander_piano
    split: train
    dataset_size: 1.0
    loader:
      batch_size: 64
      num_workers: 4

  val:
    path: null
    instrument_name: salamander_piano
    split: val
    loader:
      batch_size: 64
      num_workers: 2

model:
  name: note_proxy_tfm

  cfg:
    _target_: sfproxy.models.note_proxy_tfm.NoteProxyTransformer
    cfg:
      tokenizer:
        d_model: 256
        pitch_vocab: 128
        use_onset_pos: true

      num_layers: 6
      nhead: 8
      dim_feedforward: 1024
      dropout: 0.1

      # Must match exported dataset feature dimension (d_note)
      d_note: 2
      d_seg: 0

solver:
  _target_: sfproxy.models.lit_module.NoteProxyLitModule
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    weight_decay: 0.01
  lr: 1e-4
  scheduler: null
  scheduler_config: null
  seg_loss_weight: 0.05

callbacks:
  ckpt_last:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}
    filename: ${task_name}_last_e{epoch}
    auto_insert_metric_name: False
    every_n_epochs: 1
    save_on_train_epoch_end: True
    save_last: link
  ckpt_every5e:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}
    filename: ${task_name}_e{epoch}
    auto_insert_metric_name: False
    every_n_epochs: 5
    save_on_train_epoch_end: True
    save_top_k: -1
  ckpt_loss:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}
    filename: ${task_name}_e{epoch}_loss{val/loss:.4f}
    auto_insert_metric_name: False
    monitor: "val/loss"
    mode: min
    save_last: null
    save_top_k: 1
    every_n_epochs: 1
    save_on_train_epoch_end: False
  learning_rate_monitor:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: step
    log_momentum: False
  tqdm_progress_bar:
    _target_: lightning.pytorch.callbacks.TQDMProgressBar
    refresh_rate: 50

logger:
  wandb:
    _target_: lightning.pytorch.loggers.wandb.WandbLogger
    save_dir: ${paths.output_dir}
    offline: False
    name: ${task_name}
    id: ${run_id}
    anonymous: null
    project: "sfproxy"
    log_model: False
    prefix: ""
    group: sfproxy_${dataset.name}
    tags: ${tags}
    job_type: ${sampler_preset}_${boundary_mode}_${seg_tag:${segment_seconds}}
    resume: allow

trainer:
  _target_: lightning.pytorch.trainer.Trainer
  default_root_dir: ${paths.output_dir}
  max_epochs: 200 # 20
  accelerator: gpu
  devices: 1
  log_every_n_steps: 100
  val_check_interval: 1.0
  detect_anomaly: False
  deterministic: False
  fast_dev_run: False

hydra:
  defaults:
    - override hydra_logging: colorlog
    - override job_logging: colorlog

  run:
    dir: ${paths.ckpt_dir}/${dataset.train.instrument_name}/${task_name}

  sweep:
    dir: ${paths.proxy_dir}/multirun/sfproxy_${now:%Y-%m-%d}_${now:%H-%M-%S}
    subdir: ${hydra.job.num}_${task_name}

  job_logging:
    handlers:
      file:
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
