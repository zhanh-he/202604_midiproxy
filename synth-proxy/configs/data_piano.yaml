    max_notes: ${instrument.nmax}
    polyphony_limit: 16
    chord_prob: 0.25
    max_chord_size: 6
    duration_range: [0.08, 0.80]
    ioi_range: [0.03, 0.35]
    velocity_boundaries_01: [0.33, 0.66]
    chord_velocity_mode: shared
    p_uniform: 0.50
    p_near_boundary: 0.30
    p_extreme: 0.20
    boundary_width_01: 0.03

  coverage_shared_legacy: *coverage_v1

  realism_v1: &realism_v1
    type: realism
    seg_len_s: ${instrument.seg_len_s}
    stats_path: ${paths.analysis_dir}/stats/midi_sampler/MAESTRO_v3_sampler.json
    max_notes: ${instrument.nmax}
