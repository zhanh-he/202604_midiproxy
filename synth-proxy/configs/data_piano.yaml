defaults:
  - data
  - _self_

instrument:
  name: salamander_piano
  path: /media/mengh/SharedData/zhanh/202601_midisemi_data/soundfont/SalamanderGrandPiano/SalamanderGrandPianoV3.sfz
  backend: auto
  bank: 0
  program: 0
  polyphony: 64
  gain_db: -6.0

  sr: 22050
  seg_len_s: 2.0
  nmax: 64

sampler_preset: mixed_v2
sampler_velo_present: false

sampler_options:
