# @package _global_

defaults:
  - _self_

mode: monotonic   # monotonic | velocity_recovery

ckpt_path: null
device: cpu

paths:
  repo_root: ${oc.env:PROJECT_ROOT,.}
  workspace_dir: /media/mengh/SharedData/zhanh/202601_midisemi_data
  project_name: synth-proxy

  project_dir: ${paths.workspace_dir}/${paths.project_name}
  data_dir: ${paths.project_dir}/data
  proxy_dir: ${paths.project_dir}/proxy

model:
  name: note_proxy_tfm
  cfg:
    _target_: models.note_proxy_tfm.NoteProxyTransformer
    cfg:
      tokenizer:
        d_model: 256
        pitch_vocab: 128
        use_onset_pos: true
      num_layers: 6
      nhead: 8
      dim_feedforward: 1024
      dropout: 0.1
      d_note: 2
      d_seg: 0

monotonic:
  feature_index: 0
  sweep:
    pitch: 60
    onset_norm: 0.1
    dur_norm: 0.7
    nmax: 8
    vel_grid: 33
    eps: 1e-4

velocity_recovery:
  instrument:
    name: salamander_piano
    path: /media/mengh/SharedData/zhanh/202601_midisemi_data/soundfront/SalamanderGrandPiano-SF2-V3+20200602/SalamanderGrandPiano-V3+20200602.sf2
    backend: auto
    bank: 0
    program: 0
    polyphony: 64
    gain_db: -6.0
    sfizz_block_size: 1024
    sfizz_quality: 3
    sfizz_use_eot: false
    sr: 22050
    seg_len_s: 2.0
    nmax: 64

  sampler_base:
    type: coverage
    seg_len_s: ${velocity_recovery.instrument.seg_len_s}
    pitch_range: [21, 108]
    max_notes: ${velocity_recovery.instrument.nmax}
    polyphony_limit: 14
    chord_prob: 0.30
    max_chord_size: 6
    duration_range: [0.08, 0.80]
    ioi_range: [0.03, 0.35]
    velocity_boundaries_01: [0.33, 0.66]
    velocity_boundary_path: ${paths.repo_root}/data_analysis/stats/sfproxy_boundaries/salamander_piano_boundaries.json
    velocity_boundary_strategy: register
    register_pitch_splits: [48, 72]
    chord_velocity_mode: mixed
    p_chord_velocity_shared: 0.10
    p_chord_velocity_independent: 0.70
    p_chord_velocity_correlated: 0.20
    correlated_jitter_01: 0.05
    p_uniform: 0.50
    p_near_boundary: 0.30
    p_extreme: 0.20
    boundary_width_01: 0.03

  feature:
    n_fft: 2048
    hop: 221
    win_length: null
    harmonic_count: 5
    band_bins: 1
    energy_window_s: 0.12
    onset_pre_s: 0.02
    onset_post_s: 0.08
    include_f0_ratio: false

  filters:
    rms_min: 0.01
    rms_max: 0.30
    peak_abs_max: 0.999
    max_tries: 20

  optim:
    steps: 120
    lr: 0.03
    init: mid   # mid | random | gt_noise

  indomain:
    dataset_size: 100000
    seed_offset: 10
    num_segments: 50

  stress:
    dataset_size: 100000
    seed_offset: 20
    num_segments: 50
    overrides:
      polyphony_limit: 16
      chord_prob: 0.60
      max_chord_size: 8
      ioi_range: [0.01, 0.15]
      duration_range: [0.12, 1.20]

hydra:
  run:
    dir: ${paths.proxy_dir}/eval/${mode}_${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: true
